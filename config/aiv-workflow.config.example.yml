# aiv-workflow per-project config
#
# Copy to  <repo-root>/.aiv-workflow.yml  and edit.
# (Distinct from aiv-protocol's own `.aiv.yml`, which `aiv init` creates.)
# Skills read this file at the start of a run (path overridable via $AIV_WORKFLOW_CONFIG).
# Every key has a documented default; delete a key to accept its default.
# "auto" means the skill derives the value at runtime (usually from git).

schema: 1

project:
  # Human name (banners, memory slug). Default: basename of repo_root.
  name: auto
  # Repo root. "auto" = `git rev-parse --show-toplevel`.
  repo_root: auto

# ── Binding to aiv-protocol (Layer 1). Skills CALL this; they never reimplement the spec. ──
# aiv-protocol keeps its OWN config at `.aiv.yml` (created by `aiv init`), distinct from THIS file.
# `aiv init` also creates .github/aiv-packets/ (Layer 2 packets) + .github/aiv-evidence/ (Layer 1).
aiv:
  cli: aiv                                    # aiv-protocol CLI on PATH (install from the aiv-protocol repo, not PyPI — see README)
  spec_path: aiv-protocol/SPECIFICATION.md    # canonical spec (submodule or vendored copy)
  packets_dir: .github/aiv-packets            # Layer 2 verification packets
  evidence_dir: .github/aiv-packets/evidence  # prove-it behavioral artifacts (distinct from .github/aiv-evidence/)
  check_cmd: "aiv check"                        # validate a packet locally (file/stdin/arg; --diff, --strict, --audit-links)
  init_cmd: "aiv init"                          # AIV-ify a not-yet-enabled project (start-pr runs this)
  svp_cmd: "aiv svp"                            # Sovereign Verification Protocol sub-app (predict/probe/trace/falsify)

# ── All-class evidence mandate (Layer-2 authoring convention; CI enforcement lives in aiv-protocol). ──
evidence:
  mandate_all_classes: true       # every packet addresses A-F
  exclude_classes: [G]            # G omitted until scalable (automating it = gaming)
  na_requires_rationale: true     # a vacuous class section fails the same bar as a missing one

# ── Plans (check-drift, start-pr). ──
plans:
  dir: ~/.claude/plans
  active_slot: auto              # the plan slot start-pr treats as active; auto = most-recently-modified in dir
  # Tier-matched reference plans for check-drift Phase 1 structural drift. Omit/blank to disable refs.
  archetypes:
    R0: ""
    R1: ""
    R2: ""
    R2_followup: ""             # closure/amendment plans (sibling of R2); blank -> tier to R2
    R3: ""

# ── Memory (start-pr, launch-brief, check-drift cite these). ──
memory:
  dir: auto          # auto = ~/.claude/projects/<encoded-repo-root>/memory
  index: MEMORY.md

# ── Branch + worktree conventions (start-pr, launch-brief). ──
branch:
  # Substituted by the skills: {stage} {slug} {brief}
  pattern: "feat/{stage}-pr-{slug}-{brief}"
  # {root_parent} = dirname(repo_root); {project} = project.name; {slug} = PR slug
  worktree_pattern: "{root_parent}/{project}-pr-{slug}"
  base: origin/main
  install_cmd: "npm ci"          # deps install for a functional PR (start-pr); skip for docs-only
  # Commands run after `git worktree add` (project pre-flight). Optional; omit if none.
  # These are project-specific; enable only what your repo needs.
  postcreate: []
  # Example (uncomment per project):
  #   - "git submodule update --init --recursive"
  #   - "mkdir -p secure-storage"

# ── CI (poll-ci, the push gate, prove-it). ──
ci:
  local_replica_cmd: ""          # REQUIRED for the pre-push gate; run before every push
  test_cmd: "npx vitest run"
  e2e_cmd: "npx playwright test"
  expected_wallclock: ""         # typical CI wall-clock (e.g. "15m"); poll-ci's bound-the-wait heuristic
  checks: {}                     # extra named check commands

# ── prove-it behavioral-evidence capture. ──
prove_it:
  browser_runner: playwright     # playwright | none
  render_cmd: ""                 # command that renders a static operator-facing view to PNG
  cli_capture: true

# ── Review (check-drift, or-review cite the project's doc structure). ──
review:
  spec_sections:                 # free-form; map the §s your skills reference
    progress_tracker: ""         # e.g. "§15.3"
    iteration: ""                # e.g. "§13.5"
  coord_file: ""                 # multi-PR coordination doc, if any
  contracts_dir: .aiv/launch-briefs   # where or-review finds completion contracts (match launch_brief.out_dir)
  cr_quiet_window: "6h"          # how long since the last automated-review comment before treating it as quiet/converged

# ── Merge (poll-ci, the merge gate). ──
merge:
  strategy: rebase               # rebase only; squash forbidden
  delete_branch: true
  autonomous: false              # MUST stay false; the human is the merge gate

# ── Project docs (ground-yourself). ──
docs:
  architecture: docs/ARCHITECTURE.md   # the doc grounding reads to place a change; blank -> skip

# ── Code-health + coverage (check-drift §2.5/§2.2c). Blank disables the sub-check. ──
quality:
  code_health_cmd: ""            # per-file code-health scorer (e.g. CodeScene); blank -> skip
  code_health_changeset_cmd: ""  # branch/change-set-level code-health review; blank -> skip that sub-check
  coverage_floor: ""             # coverage ratchet floor (e.g. "15/15/21/14%"); blank -> no numeric target

# ── Audit output (rigor-audit). ──
audit:
  out_dir: .aiv/audits           # rigor-audit writes the Sources-Checked Manifest here

# ── launch-brief output + PR-class vocabulary. ──
launch_brief:
  out_dir: .aiv/launch-briefs    # brief + completion contract written here (match review.contracts_dir)
  # Default project-agnostic class set; extend per project.
  pr_classes: [migration, ui-render, dispatcher, refactor, schema-additive, infrastructure, e2e-harness, test-debt, observability, docs]
